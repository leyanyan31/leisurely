<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leisurely - Forgot Password</title>
    <link rel="stylesheet" href="./Leisurely.css" />
</head>
<body data-page="forgot">
    <div id="app">
        <header class="topbar">
            <div class="brand"><div class="logo-bubble">L</div><div><h1>Leisurely</h1><p class="tagline">Reset your password</p></div></div>
            <nav class="nav-links"><a href="./login.html">Log In</a><a href="./signup.html">Sign Up</a></nav>
        </header>
        <section class="grid">
            <article class="card">
                <h3>Send Reset Email</h3>
                <form id="sendForm">
                    <label>Email</label><input required name="email" type="email" />
                    <button type="submit">Send Reset Code</button>
                </form>
            </article>
            <article class="card">
                <h3>Use Reset Code</h3>
                <form id="resetForm">
                    <label>Email</label><input required name="email" type="email" />
                    <label>Reset Code</label><input required name="code" />
                    <label>New Password</label><input required name="password" type="password" minlength="6" />
                    <button type="submit">Reset Password</button>
                </form>
            </article>
        </section>
        <p id="msg" class="status"></p>
    </div>
    <script src="./Leisurely.app.js"></script>
</body>
</html>
