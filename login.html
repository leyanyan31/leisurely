<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leisurely - Log In</title>
    <link rel="stylesheet" href="./Leisurely.css" />
</head>
<body data-page="login">
    <div id="app">
        <header class="topbar">
            <div class="brand"><div class="logo-bubble">L</div><div><h1>Leisurely</h1><p class="tagline">Log in to your schedule</p></div></div>
            <nav class="nav-links"><a href="#" id="backBtn">Back</a><a href="./signup.html">Sign Up</a></nav>
        </header>
        <section class="card">
            <h2>Log In</h2>
            <form id="loginForm" class="mini-card">
                <label>Email</label><input required type="email" name="email" />
                <label>Password</label><input required type="password" name="password" />
                <button type="submit">Log In</button>
                <a href="./forgot-password.html">Forgot password?</a>
            </form>
            <p id="msg" class="status"></p>
        </section>
    </div>
    <script src="./Leisurely.app.js"></script>
</body>
</html>
