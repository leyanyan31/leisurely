<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leisurely - Room</title>
    <link rel="stylesheet" href="./Leisurely.css" />
</head>
<body data-page="room">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app">
        <header class="topbar" role="banner">
            <div class="brand">
                <div class="logo-bubble" aria-hidden="true">L</div>
                <div>
                    <h1>Leisurely</h1>
                    <p class="tagline" id="roomTitle">Room</p>
                </div>
            </div>
            <nav class="nav-links" role="navigation" aria-label="Main navigation">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./profile.html">Profile</a>
                <a href="./settings.html">Settings</a>
                <a href="./rooms.html">Rooms</a>
                <a href="#" id="logoutBtn">Log Out</a>
            </nav>
        </header>
        <main id="main-content">
            <section id="status" class="status" aria-live="polite" aria-atomic="true"></section>
            <section id="kpis" class="kpis" aria-label="Room statistics"></section>
            <section class="grid">
                <article class="card">
                    <div class="title-row">
                        <h3 id="tasksHeading">Room Tasks</h3>
                        <button id="openTaskModalBtn" type="button">Add Task</button>
                    </div>
                    <div class="table-wrap">
                        <table role="grid" aria-labelledby="tasksHeading">
                            <thead>
                                <tr>
                                    <th scope="col">Task</th>
                                    <th scope="col">Date</th>
                                    <th scope="col">Time</th>
                                    <th scope="col">Owner</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="taskRows"></tbody>
                        </table>
                    </div>
                </article>
                <article class="card">
                    <div class="title-row">
                        <button id="prevMonthBtn" type="button" class="ghost action-btn" aria-label="Previous month">◀</button>
                        <h3 id="calendarTitle">Calendar</h3>
                        <button id="nextMonthBtn" type="button" class="ghost action-btn" aria-label="Next month">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendar" role="grid" aria-label="Calendar"></div>
                </article>
            </section>
            <section class="card">
                <div class="title-row">
                    <h3>Group AI Suggestions</h3>
                    <button id="refreshAiBtn" type="button" class="ghost">Refresh AI Suggestions</button>
                </div>
                <ul id="aiList" aria-label="Group AI generated suggestions"></ul>
            </section>
        </main>
        <div id="taskModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
            <div class="modal-card">
                <div class="title-row">
                    <h3 id="taskModalTitle">Add Task</h3>
                    <button id="closeTaskModalBtn" type="button" class="ghost" aria-label="Close modal">Close</button>
                </div>
                <form id="taskForm">
                    <label for="taskTitle">Task</label>
                    <input required id="taskTitle" name="title" autocomplete="off" />
                    <label for="taskDate">Date</label>
                    <input required id="taskDate" type="date" name="date" />
                    <div class="row">
                        <div>
                            <label for="taskStart">Start</label>
                            <input required id="taskStart" type="time" name="start" />
                        </div>
                        <div>
                            <label for="taskEnd">End</label>
                            <input required id="taskEnd" type="time" name="end" />
                        </div>
                    </div>
                    <button type="submit">Save Task</button>
                </form>
            </div>
        </div>
    </div>
    <script src="./Leisurely.app.js"></script>
</body>
</html>
