<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leisurely - Rooms</title>
    <link rel="stylesheet" href="./Leisurely.css" />
</head>
<body data-page="rooms">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app">
        <header class="topbar" role="banner">
            <div class="brand">
                <div class="logo-bubble" aria-hidden="true">L</div>
                <div><h1>Leisurely</h1><p class="tagline">Friends and shared rooms</p></div>
            </div>
            <nav class="nav-links" role="navigation" aria-label="Main navigation">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./profile.html">Profile</a>
                <a href="./settings.html">Settings</a>
                <a href="#" id="logoutBtn">Log Out</a>
            </nav>
        </header>
        <main id="main-content">
            <section class="grid">
                <article class="card">
                    <h3>Join Room with Code</h3>
                    <form id="joinRoomForm" class="join-room-form">
                        <input required name="joinCode" type="text" placeholder="Enter room code" pattern="[A-Za-z0-9]{6}" maxlength="6" aria-label="Room code" />
                        <button type="submit">Join</button>
                    </form>
                </article>
                <article class="card">
                    <h3>Add Friend</h3>
                    <form id="friendForm" class="row">
                        <input required name="friendEmail" type="email" placeholder="friend@email.com" autocomplete="email" />
                        <button type="submit">Add Friend</button>
                    </form>
                    <ul id="friendList" class="friend-list" aria-label="Friends list"></ul>
                </article>
                <article class="card">
                    <h3>Create Room</h3>
                    <form id="roomForm" class="row">
                        <input required name="roomName" placeholder="Study Group" autocomplete="off" />
                        <button type="submit">Create Room</button>
                    </form>
                    <h4 style="margin: 16px 0 8px;">Your Rooms</h4>
                    <ul id="roomList" class="room-list" aria-label="Rooms list"></ul>
                </article>
            </section>
        </main>
    </div>
    <script src="./Leisurely.app.js"></script>
</body>
</html>
